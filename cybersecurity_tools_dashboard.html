const CATS = ["All", "Reconnaissance", "Exploitation", "Web Testing", "Password Attack", "Wireless", "OSINT", "Vulnerability Scan", "Defense", "Forensics", "Post-Exploitation", "Social Engineering"];

const COLOR_MAP = {
  blue:   {bg:"#E6F1FB", border:"#185FA5", text:"#0C447C", bar:"#378ADD"},
  red:    {bg:"#FCEBEB", border:"#A32D2D", text:"#791F1F", bar:"#E24B4A"},
  amber:  {bg:"#FAEEDA", border:"#854F0B", text:"#633806", bar:"#BA7517"},
  teal:   {bg:"#E1F5EE", border:"#0F6E56", text:"#085041", bar:"#1D9E75"},
  green:  {bg:"#EAF3DE", border:"#3B6D11", text:"#27500A", bar:"#639922"},
  purple: {bg:"#EEEDFE", border:"#534AB7", text:"#3C3489", bar:"#7F77DD"},
};

const TAG_COLOR_MAP = {blue:"tag-blue",red:"tag-red",green:"tag-green",amber:"tag-amber",purple:"tag-purple",teal:"tag-teal"};

let activeCat = "All";
let activeToolId = null;

function buildPills() {
  const wrap = document.getElementById("catPills");
  CATS.forEach(c => {
    const b = document.createElement("button");
    b.className = "pill" + (c === "All" ? " on" : "");
    b.textContent = c;
    b.onclick = () => { activeCat = c; filterTools(); document.querySelectorAll(".pill").forEach(p => p.classList.toggle("on", p.textContent === c)); };
    wrap.appendChild(b);
  });
}

function getRiskColor(r) {
  if (r === "Critical") return {bg:"#FCEBEB",color:"#791F1F"};
  if (r === "High") return {bg:"#FAEEDA",color:"#633806"};
  if (r === "Medium") return {bg:"#E6F1FB",color:"#0C447C"};
  return {bg:"#EAF3DE",color:"#27500A"};
}

function getBarColor(pct) {
  if (pct >= 85) return "#E24B4A";
  if (pct >= 75) return "#BA7517";
  if (pct >= 65) return "#1D9E75";
  return "#378ADD";
}

function filterTools() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = TOOLS.filter(t => {
    const matchCat = activeCat === "All" || t.cat === activeCat;
    const matchQ = !q || t.name.toLowerCase().includes(q) || t.purpose.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderStats(filtered);
  renderGrid(filtered);
  if (activeToolId) {
    const still = filtered.find(t => t.id === activeToolId);
    if (!still) { document.getElementById("detailPanel").style.display = "none"; activeToolId = null; }
  }
}

function renderStats(list) {
  const wrap = document.getElementById("statsRow");
  const avg = list.length ? Math.round(list.reduce((s, t) => s + t.success, 0) / list.length) : 0;
  const crit = list.filter(t => t.risk === "Critical").length;
  const def = list.filter(t => t.cat === "Defense" || t.cat === "Forensics").length;
  wrap.innerHTML = `
    <div class="stat"><div class="stat-val">${list.length}</div><div class="stat-lbl">Tools shown</div></div>
    <div class="stat"><div class="stat-val">${avg}%</div><div class="stat-lbl">Avg success rate</div></div>
    <div class="stat"><div class="stat-val">${crit}</div><div class="stat-lbl">Critical risk</div></div>
    <div class="stat"><div class="stat-val">${def}</div><div class="stat-lbl">Defensive tools</div></div>`;
}

function renderGrid(list) {
  const grid = document.getElementById("toolsGrid");
  if (!list.length) { grid.innerHTML = '<div class="empty">No tools match your search.</div>'; return; }
  grid.innerHTML = "";
  list.forEach(t => {
    const cs = COLOR_MAP[t.color];
    const bar = getBarColor(t.success);
    const card = document.createElement("div");
    card.className = "tool-card" + (t.id === activeToolId ? " active" : "");
    card.id = "tc-" + t.id;
    if (t.id === activeToolId) { card.style.borderColor = cs.border; }
    card.innerHTML = `
      <div class="tc-head">
        <div>
          <div class="tc-name">${t.name}</div>
          <div class="tc-cat">${t.cat}</div>
        </div>
        <div class="tc-icon" style="background:${cs.bg};color:${cs.text}">${t.abbr}</div>
      </div>
      <div class="tc-purpose">${t.purpose}</div>
      <div class="rate-row">
        <div class="rate-bar-bg"><div class="rate-bar-fill" style="width:${t.success}%;background:${bar}"></div></div>
        <span class="rate-pct" style="color:${bar}">${t.success}%</span>
      </div>`;
    card.onclick = () => selectTool(t);
    grid.appendChild(card);
  });
}

function selectTool(t) {
  document.querySelectorAll(".tool-card").forEach(c => {
    c.classList.remove("active");
    c.style.borderColor = "";
    c.style.borderWidth = "";
  });
  const cs = COLOR_MAP[t.color];
  const card = document.getElementById("tc-" + t.id);
  if (card) { card.classList.add("active"); card.style.borderColor = cs.border; card.style.borderWidth = "1.5px"; }
  activeToolId = t.id;
  renderDetail(t);
  const dp = document.getElementById("detailPanel");
  dp.style.display = "block";
  setTimeout(() => dp.scrollIntoView({behavior:"smooth",block:"nearest"}), 60);
}

function renderDetail(t) {
  const cs = COLOR_MAP[t.color];
  const bar = getBarColor(t.success);
  const rc = getRiskColor(t.risk);
  const tagHTML = t.tags.map((tag, i) => `<span class="tag ${TAG_COLOR_MAP[t.ttags[i]] || 'tag-blue'}">${tag}</span>`).join("");
  const counterHTML = t.counters.map(c => `<li><div class="ci"><svg viewBox="0 0 8 8" fill="none" stroke="#3B6D11" stroke-width="1.5"><polyline points="1,4 3,6 7,2"/></svg></div><span>${c}</span></li>`).join("");
  document.getElementById("detailPanel").innerHTML = `
    <div class="dp-header">
      <div class="dp-icon-big" style="background:${cs.bg};color:${cs.text};font-size:14px">${t.abbr}</div>
      <div style="flex:1">
        <div class="dp-title">${t.name}</div>
        <div class="dp-sub">${t.cat} &nbsp;·&nbsp; ${t.platform}</div>
      </div>
      <span class="risk-badge" style="background:${rc.bg};color:${rc.color}">${t.risk} risk</span>
    </div>
    <div class="dp-body">
      <div class="dp-col">
        <div class="dp-section">
          <div class="dp-lbl">About</div>
          <div class="dp-text">${t.desc}</div>
        </div>
        <div class="dp-section">
          <div class="dp-lbl">Used by</div>
          <div class="dp-text">${t.usedBy}</div>
        </div>
        <div class="dp-section">
          <div class="tags">${tagHTML}</div>
        </div>
        <div class="dp-section">
          <div class="dp-lbl">Success / effectiveness rate</div>
          <div class="rate-big"><span class="rate-num" style="color:${bar}">${t.success}%</span><span class="rate-lbl">in real-world scenarios</span></div>
          <div class="rate-bar-big"><div class="rate-bar-big-fill" style="width:${t.success}%;background:${bar}"></div></div>
          <div style="font-size:12px;color:var(--color-text-secondary)">Based on industry pentest reports &amp; CVE exploitation data</div>
        </div>
        <div class="dp-section">
          <div class="dp-lbl">Common commands / usage</div>
          <div class="cmd-box">${t.cmd}</div>
        </div>
        <button class="ask-btn" onclick="sendPrompt('${t.name} ke baare mein aur detail mein batao — exam ke liye notes')">Deep dive — ${t.name} ↗</button>
      </div>
      <div class="dp-col">
        <div class="dp-section">
          <div class="dp-lbl">How to counter / defend against this tool</div>
          <ul class="counter-list">${counterHTML}</ul>
        </div>
      </div>
    </div>`;
}

buildPills();
filterTools();
</script>
